<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UrbanLexTracker - Bienvenido</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#908f9d",
              "on-tertiary-fixed-variant": "#00531e",
              "secondary-fixed-dim": "#b4cad6",
              "tertiary-fixed": "#69ff87",
              "on-primary": "#002780",
              "surface-container-high": "#222a3d",
              "on-tertiary-container": "#00b048",
              "on-secondary": "#1e333c",
              "on-primary-fixed": "#001550",
              "surface-bright": "#31394d",
              "tertiary": "#3ce36a",
              "primary-container": "#00267e",
              "on-surface": "#dae2fd",
              "secondary-fixed": "#cfe6f2",
              "secondary": "#b4cad6",
              "on-background": "#dae2fd",
              "surface-tint": "#b6c4ff",
              "inverse-primary": "#004ee8",
              "inverse-on-surface": "#283044",
              "on-tertiary": "#003912",
              "inverse-surface": "#dae2fd",
              "surface-container-highest": "#2d3449",
              "on-primary-container": "#7391ff",
              "error-container": "#93000a",
              "on-error-container": "#ffdad6",
              "on-error": "#690005",
              "outline-variant": "#454652",
              "surface-container": "#171f33",
              "surface": "#0b1326",
              "tertiary-container": "#003912",
              "background": "#0b1326",
              "on-secondary-container": "#a6bcc7",
              "surface-dim": "#0b1326",
              "on-primary-fixed-variant": "#003ab3",
              "surface-container-low": "#131b2e",
              "primary-fixed": "#dce1ff",
              "primary-fixed-dim": "#b6c4ff",
              "on-tertiary-fixed": "#002108",
              "surface-container-lowest": "#060e20",
              "secondary-container": "#374c56",
              "error": "#ffb4ab",
              "surface-variant": "#2d3449",
              "primary": "#b6c4ff",
              "tertiary-fixed-dim": "#3ce36a",
              "on-secondary-fixed": "#071e27",
              "on-surface-variant": "#c6c5d4",
              "on-secondary-fixed-variant": "#354a53"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(23, 31, 51, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
<!-- TopAppBar suppressed for transactional/success screen flow to prioritize focus -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Ambient background elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-tertiary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-2xl text-center space-y-12 relative z-10">
<!-- Success Icon Section -->
<div class="flex flex-col items-center">
<div class="relative group">
<!-- Glow effect -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl group-hover:bg-primary/30 transition-all duration-700"></div>
<div class="relative w-32 h-32 md:w-40 md:h-40 flex items-center justify-center bg-gradient-to-tr from-surface-container-highest to-surface-container rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
<span class="material-symbols-outlined text-primary text-6xl md:text-7xl" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
</div>
</div>
<!-- Content Header -->
<div class="space-y-4">
<h1 class="font-headline font-extrabold text-4xl md:text-5xl lg:text-6xl text-on-surface tracking-tight">
                    ¡Todo listo, Alejandro!
                </h1>
<p class="text-on-surface-variant text-lg md:text-xl max-w-lg mx-auto leading-relaxed">
                    Tu perfil ha sido configurado correctamente. <span class="text-primary font-semibold">UrbanLexTracker</span> ya está monitoreando las fuentes seleccionadas para ti.
                </p>
</div>
<!-- Summary Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-xl mx-auto">
<div class="surface-container-low glass-panel p-6 rounded-xl flex items-center space-x-4 text-left transition-all hover:bg-surface-container duration-300">
<div class="w-12 h-12 rounded-lg bg-primary-container/30 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">analytics</span>
</div>
<div>
<p class="text-primary font-headline font-bold text-xl leading-none">6 fuentes</p>
<p class="text-on-surface-variant text-sm font-medium mt-1">activas</p>
</div>
</div>
<div class="surface-container-low glass-panel p-6 rounded-xl flex items-center space-x-4 text-left transition-all hover:bg-surface-container duration-300">
<div class="w-12 h-12 rounded-lg bg-tertiary-container/30 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">notifications_active</span>
</div>
<div>
<p class="text-tertiary font-headline font-bold text-xl leading-none">Alertas diarias</p>
<p class="text-on-surface-variant text-sm font-medium mt-1">configuradas</p>
</div>
</div>
</div>
<!-- CTA Section -->
<div class="pt-6">
<button class="group relative inline-flex items-center justify-center px-10 py-4 font-headline font-bold text-on-primary bg-gradient-to-r from-primary to-primary-container rounded-xl shadow-[0_10px_30px_rgba(0,39,128,0.4)] transition-all duration-300 hover:scale-[1.02] active:scale-95 overflow-hidden">
<span class="relative z-10 flex items-center">
                        Ir al Panel de Control
                        <span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="py-8 px-6 text-center border-t border-outline-variant/10">
<div class="flex items-center justify-center space-x-2 text-on-surface-variant/40">
<span class="font-headline font-bold tracking-tighter text-sm uppercase">UrbanLexTracker</span>
<span class="text-[10px]">•</span>
<span class="font-label text-xs tracking-widest">© 2024 PRECISION ENGINE</span>
</div>
</footer>
<!-- BottomNavBar Suppressed for Success Screen to avoid distraction -->
</body></html>
