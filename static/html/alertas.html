<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Alertas — UrbanLexTracker</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="/static/js/auth.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#131b2e", "tertiary": "#3ce36a", "primary": "#b6c4ff",
                        "surface-container": "#171f33", "on-surface": "#dae2fd", "background": "#0b1326",
                        "outline-variant": "#454652", "surface": "#0b1326", "secondary": "#b4cad6"
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] }
                }
            }
        }
    </script>
    <style>
        body { min-height: 100dvh; background-color: #0b1326; overflow-x: hidden; }
        .sidebar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 80px; overflow: hidden; cursor: pointer; }
        .sidebar.expanded { width: 280px; }
        .main-content { transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin-left: 80px; }
        .sidebar.expanded + .main-content { margin-left: 280px; }
        .sidebar-text { opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none; }
        .sidebar.expanded .sidebar-text { opacity: 1; pointer-events: auto; }
        
        .chip-active { background: #b6c4ff; color: #002780; }
        .chip-inactive { background: #222a3d; color: #c6c5d4; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="font-body text-on-surface">

<!-- Sidebar Navigation -->
<aside id="sidebar" class="sidebar fixed top-0 left-0 h-full bg-surface-container border-r border-white/5 z-[60] flex flex-col group" onclick="expandSidebar(event)">
    <a href="/" class="p-6 flex items-center gap-4 mb-4 hover:bg-white/5 transition-colors" onclick="event.stopPropagation()">
        <div class="bg-primary p-2 rounded-xl flex-shrink-0">
            <span class="material-symbols-outlined text-background font-bold">gavel</span>
        </div>
        <span class="sidebar-text font-headline font-extrabold text-xl text-primary">UrbanLexTracker</span>
    </a>
    
    <nav class="flex-1 px-4 space-y-2 mt-4">
        <a href="/dashboard" class="flex items-center gap-4 p-3 rounded-xl text-on-surface-variant hover:bg-white/5 transition-colors" onclick="event.stopPropagation()">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="sidebar-text font-bold text-sm">Pizarrón General</span>
        </a>
        <a href="/reporte" class="flex items-center gap-4 p-3 rounded-xl text-on-surface-variant hover:bg-white/5 transition-colors" onclick="event.stopPropagation()">
            <span class="material-symbols-outlined">description</span>
            <span class="sidebar-text font-bold text-sm">Reporte de IA (Oficio)</span>
        </a>
        <a href="/alertas" class="flex items-center gap-4 p-3 rounded-xl bg-primary/10 text-primary transition-colors" onclick="event.stopPropagation()">
            <span class="material-symbols-outlined !fill-1">notifications</span>
            <span class="sidebar-text font-bold text-sm">Historial de Alertas</span>
        </a>
        <a href="/configuracion" class="flex items-center gap-4 p-3 rounded-xl text-on-surface-variant hover:bg-white/5 transition-colors" onclick="event.stopPropagation()">
            <span class="material-symbols-outlined">settings</span>
            <span class="sidebar-text font-bold text-sm">Configuración</span>
        </a>
    </nav>
    
    <div class="px-4 py-6 border-t border-white/5 space-y-4">
        <a href="/pricing" class="flex items-center gap-4 p-4 rounded-2xl bg-gradient-to-r from-primary/20 to-transparent border border-primary/20 text-primary hover:from-primary/30 transition-all shadow-lg shadow-primary/5" onclick="event.stopPropagation()">
            <span class="material-symbols-outlined font-bold">star</span>
            <span class="sidebar-text font-bold text-sm uppercase tracking-widest">Planes y Precios</span>
        </a>
        <button onclick="ULT.logout(); event.stopPropagation();" class="w-full flex items-center gap-4 p-3 rounded-xl text-on-surface-variant hover:bg-error/10 hover:text-error transition-all">
            <span class="material-symbols-outlined">logout</span>
            <span class="sidebar-text font-bold text-sm">Cerrar Sesión</span>
        </button>
    </div>
</aside>

<div class="main-content min-h-screen flex flex-col">
    <header class="h-24 px-8 flex items-center justify-between border-b border-white/5 bg-background/50 backdrop-blur-md sticky top-0 z-40">
        <h2 class="text-2xl font-headline font-black tracking-tight">Historial de Alertas</h2>
        <button onclick="runAllScrapers()" class="flex items-center gap-2 px-6 py-2 bg-primary/10 text-primary border border-primary/20 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-primary/20 transition-all">
            <span class="material-symbols-outlined text-sm">sync</span> Sincronizar Todo
        </button>
    </header>

    <main class="flex-1 p-8 max-w-5xl mx-auto w-full space-y-8 custom-scrollbar">
        <div class="space-y-6">
            <div class="relative group">
                <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">search</span>
                <input id="search-input" type="text" placeholder="Buscar decretos, leyes, resoluciones..."
                    class="w-full bg-surface-container border border-white/5 py-5 pl-14 pr-6 text-on-surface placeholder:text-on-surface-variant/40 rounded-3xl focus:outline-none focus:border-primary/50 transition-all shadow-2xl"/>
            </div>
            <div class="flex flex-wrap gap-2" id="source-filters">
                <button class="chip-active px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="" onclick="setSourceFilter(this, '')">Todas</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="diario-oficial" onclick="setSourceFilter(this, 'diario-oficial')">Diario Oficial</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="contraloria" onclick="setSourceFilter(this, 'contraloria')">Contraloría</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="minvu" onclick="setSourceFilter(this, 'minvu')">MINVU</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="bcn" onclick="setSourceFilter(this, 'bcn')">BCN</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="poder-judicial" onclick="setSourceFilter(this, 'poder-judicial')">Poder Judicial</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="prensa" onclick="setSourceFilter(this, 'prensa')">Prensa</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="proyectos-ley" onclick="setSourceFilter(this, 'proyectos-ley')">Proyectos</button>
                <button class="chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all" data-source="ipt" onclick="setSourceFilter(this, 'ipt')">IPT</button>
            </div>
        </div>

        <div id="alerts-feed" class="space-y-4 pb-20">
            <div class="p-6 bg-surface-container rounded-[32px] border border-white/5 animate-pulse h-32"></div>
            <div class="p-6 bg-surface-container rounded-[32px] border border-white/5 animate-pulse h-32"></div>
        </div>
    </main>
</div>

<script>
let isExpanded = false;
function expandSidebar(event) {
    const sidebar = document.getElementById('sidebar');
    if (!isExpanded) { sidebar.classList.add('expanded'); isExpanded = true; }
    else if (event.target === sidebar || event.target.tagName === 'ASIDE') {
        sidebar.classList.remove('expanded'); isExpanded = false;
    }
}

async function startApp() {
    try {
        if (!ULT.requireAuth()) return;
        loadAlerts(true);
    } catch(e) {}
}

let currentSource = "";
let currentOffset = 0;
const PAGE_SIZE = 20;

function formatDocTitle(fullTitle, dateStr) {
    const match = fullTitle.match(/^((?:Ley|Decreto(?: Exento)?|Resoluci[oó]n|DDU(?:-ESP)?|Oficio|Dictamen|Circular|Fallo|PRC|Sentencia|Corte|CGR)\s+[\s\w\-.º°]+)(?::|\.|-)\s*(.*)/i);
    let boldPart = fullTitle;
    let normalPart = "";
    
    if (match && match[2].trim().length > 0) {
        boldPart = match[1].trim();
        normalPart = match[2].trim();
    } else {
        const sepIdx = fullTitle.search(/[:.-]/);
        if (sepIdx > 3 && sepIdx < 40) {
            boldPart = fullTitle.substring(0, sepIdx).trim();
            normalPart = fullTitle.substring(sepIdx + 1).trim();
        }
    }
    
    let html = `<span class="font-black text-white">${boldPart} <span class="opacity-60 text-xs tracking-widest uppercase ml-2 px-2 py-0.5 bg-white/10 rounded">${dateStr}</span></span>`;
    if (normalPart) {
        html += ` <span class="font-medium text-white/70 ml-1">- ${normalPart}</span>`;
    }
    return html;
}

function formatCardDate(rawDate) {
    if (!rawDate) return "Fecha desconocida";
    if (rawDate.includes(" de ")) return rawDate;
    return rawDate.split(" ")[0];
}

async function loadAlerts(reset = false) {
    if (reset) currentOffset = 0;
    const feed = document.getElementById("alerts-feed");
    const search = document.getElementById("search-input").value.trim();
    if (reset) feed.innerHTML = '<div class="p-6 bg-surface-container rounded-[32px] border border-white/5 animate-pulse h-32"></div>';

    try {
        let url = `/api/alerts?limit=${PAGE_SIZE}&offset=${currentOffset}`;
        if (currentSource) url += `&source=${currentSource}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        const resp = await fetch(url, {
             headers: { 'Authorization': `Bearer ${ULT.getToken()}` }
        });
        const data = await resp.json();
        const html = data.alerts.map(a => {
            let rawDate = a.date || a.fecha || a.created_at || "Fecha desconocida";
            const dateStr = formatCardDate(rawDate);
            const summaryStr = a.summary || a.descripcion || "";
            const titleStr = a.title || a.titulo || "Documento sin título";
            
            return `
            <article class="p-6 bg-surface-container rounded-[24px] border border-white/5 hover:border-white/40 hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] transition-all group shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[9px] font-black text-primary uppercase tracking-[0.2em] bg-primary/10 px-3 py-1 rounded-full">${a.source}</span>
                    <div class="flex items-center gap-3">
                        <a href="${a.url}" target="_blank" class="text-[10px] font-bold text-primary flex items-center gap-1 hover:underline bg-primary/10 px-3 py-1 rounded-md border border-primary/20 transition-colors">
                            Ver Fuente Original <span class="material-symbols-outlined text-[10px]">open_in_new</span>
                        </a>
                    </div>
                </div>
                <h3 class="font-headline text-lg mb-2 group-hover:text-primary transition-colors leading-tight">${formatDocTitle(titleStr, dateStr)}</h3>
                ${summaryStr && summaryStr !== "undefined" ? `<p class="text-sm text-on-surface-variant font-medium leading-relaxed line-clamp-2">${summaryStr}</p>` : ''}
            </article>
        `}).join('');

        if (reset) feed.innerHTML = html || '<div class="text-center py-20 opacity-30">No se encontraron hallazgos en este segmento.</div>';
        else feed.insertAdjacentHTML("beforeend", html);
    } catch(e) { console.error(e); }
}

function setSourceFilter(btn, source) {
    document.querySelectorAll("#source-filters button").forEach(b => { b.className = "chip-inactive px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all"; });
    btn.className = "chip-active px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all";
    currentSource = source;
    loadAlerts(true);
}

async function runAllScrapers() {
    ULT.showToast("Sincronizando...", "info");
    const resp = await fetch("/api/scrape/all", {
         headers: { 'Authorization': `Bearer ${ULT.getToken()}` }
    });
    if (resp.ok) { loadAlerts(true); }
}

startApp();
</script>
</body>
</html>
